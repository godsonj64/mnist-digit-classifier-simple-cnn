# Default configuration for the MNIST Digit Classifier

seed: 42

data:
  root: data
  train_dir: train
  val_dir: val
  image_size: 28
  num_classes: 10
  batch_size: 64
  num_workers: 4

model:
  # Options: efficientnet_b0 (recommended) or small_cnn (baseline)
  name: small_cnn
  pretrained: true

train:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  device: cuda  # falls back to cpu automatically if cuda is unavailable
  checkpoint_dir: checkpoints

export:
  output_dir: exported
  onnx_opset: 13
