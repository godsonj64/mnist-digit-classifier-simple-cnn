seed: 42

data:
  root: data
  train_dir: data/train
  val_dir: data/val
  image_size: 32
  num_workers: 2
  auto_download: true

model:
  # Options: mobilenet_v3_small | small_cnn
  name: mobilenet_v3_small
  num_classes: 10
  pretrained: true

train:
  epochs: 5
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  device: auto
  checkpoint: artifacts/model.pt

export:
  onnx_path: artifacts/model.onnx
  torchscript_path: artifacts/model.ts
  opset: 13
