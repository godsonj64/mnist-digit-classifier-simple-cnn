seed: 42

data:
  data_dir: data
  train_split: train
  val_split: val
  image_size: 32
  num_workers: 2

model:
  # Options: mobilenet_v3_small (recommended) or small_cnn (baseline)
  name: mobilenet_v3_small
  num_classes: 10
  pretrained: true

train:
  epochs: 5
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  device: auto

output:
  dir: outputs
  checkpoint_name: best_model.pt

export:
  pytorch_name: model_export.pt
  onnx_name: model_export.onnx
  onnx_opset: 12
